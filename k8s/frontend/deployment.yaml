apiVersion: apps/v1
kind: Deployment
metadata:
  name: glowcart-frontend
  namespace: glowcart
  labels:
    app.kubernetes.io/name: glowcart-frontend
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: glowcart-platform
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: glowcart-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glowcart-frontend
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: frontend
          image: glowcart-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30