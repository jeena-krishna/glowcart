apiVersion: apps/v1
kind: Deployment
metadata:
  name: glowcart-backend
  namespace: glowcart
  labels:
    app.kubernetes.io/name: glowcart-backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: glowcart-platform
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: glowcart-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glowcart-backend
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: backend
          image: glowcart-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: glowcart-config
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: glowcart-secrets
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: glowcart-secrets
                  key: SPRING_DATASOURCE_PASSWORD
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              valueFrom:
                configMapKeyRef:
                  name: glowcart-config
                  key: SPRING_JPA_HIBERNATE_DDL_AUTO
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: glowcart-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRATION
              valueFrom:
                configMapKeyRef:
                  name: glowcart-config
                  key: JWT_EXPIRATION
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: glowcart-secrets
                  key: STRIPE_SECRET_KEY
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: glowcart-secrets
                  key: STRIPE_WEBHOOK_SECRET
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 12
      terminationGracePeriodSeconds: 30