apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: glowcart-backend-hpa
  namespace: glowcart
  labels:
    app.kubernetes.io/name: glowcart-backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: glowcart-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: glowcart-backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120