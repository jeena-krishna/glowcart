server:
  port: 8080

spring:
  application:
    name: glowcart

  # ── Database ──────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/glowcart_db
    username: glowcart_user
    password: glowcart_pass
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000

  # ── JPA / Hibernate ──────────────────────────────────────
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── Temporarily disable Spring Security ──────────────────
  

logging:
  level:
    com.glowcart: DEBUG
    org.hibernate.SQL: DEBUG

  # ── JWT Configuration ────────────────────────────────────
jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000

# ── Stripe Configuration ─────────────────────────────────
stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}