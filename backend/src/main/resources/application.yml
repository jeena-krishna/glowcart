server:
  port: 8080

spring:
  application:
    name: glowcart

  # ── Database ──────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/glowcart_db
    username: glowcart_user
    password: glowcart_pass
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000

  # ── JPA / Hibernate ──────────────────────────────────────
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── Temporarily disable Spring Security ──────────────────
  security:
    user:
      name: admin
      password: admin

logging:
  level:
    com.glowcart: DEBUG
    org.hibernate.SQL: DEBUG