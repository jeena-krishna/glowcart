server:
  port: 8080

spring:
  application:
    name: glowcart

  # ── Database ──────────────────────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/glowcart_db}
    username: ${SPRING_DATASOURCE_USERNAME:glowcart_user}
    password: ${SPRING_DATASOURCE_PASSWORD:glowcart_pass}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000

  # ── JPA / Hibernate ──────────────────────────────────────
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.glowcart: INFO

# ── JWT Configuration ────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: ${JWT_EXPIRATION:86400000}

# ── Stripe Configuration ─────────────────────────────────
stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}